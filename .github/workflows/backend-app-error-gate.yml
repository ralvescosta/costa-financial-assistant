name: backend-app-error-gate

on:
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend-app-error-gate.yml'
  push:
    branches:
      - main
      - master
    paths:
      - 'backend/**'
      - '.github/workflows/backend-app-error-gate.yml'

jobs:
  app-error-contract:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod

      - name: AppError Contract Checks
        run: |
          set -euo pipefail
          go test ./pkgs/errors/...
          go test ./tests/integration/cross_service -run 'Test(AppErrorPropagationAcrossLayers_T012|NoRawErrorsLeakBoundary_T012|RetryabilityPreservation_T012|AsyncErrorNoSensitiveDataLeak_T061|UnknownFallback.*_T038|BoundaryLogging_.*_T064)'
          go test ./internals/...
