syntax = "proto3";

package files.v1;

import "common/v1/messages.proto";

option go_package = "github.com/ralvescosta/costa-financial-assistant/backend/protos/generated/files/v1;filesv1";

// DocumentKind classifies an uploaded document.
enum DocumentKind {
  DOCUMENT_KIND_UNSPECIFIED = 0;
  DOCUMENT_KIND_BILL        = 1;
  DOCUMENT_KIND_STATEMENT   = 2;
}

// AnalysisStatus tracks the asynchronous processing lifecycle.
enum AnalysisStatus {
  ANALYSIS_STATUS_UNSPECIFIED    = 0;
  ANALYSIS_STATUS_PENDING        = 1;
  ANALYSIS_STATUS_PROCESSING     = 2;
  ANALYSIS_STATUS_ANALYSED       = 3;
  ANALYSIS_STATUS_ANALYSIS_FAILED = 4;
}

// Document holds the uploaded PDF metadata and processing state.
message Document {
  string         id               = 1;
  string         project_id       = 2;
  string         uploaded_by      = 3;
  DocumentKind   kind             = 4;
  string         storage_provider = 5;
  string         storage_key      = 6;
  string         file_name        = 7;
  string         file_hash        = 8;
  AnalysisStatus analysis_status  = 9;
  string         failure_reason   = 10;
  string         uploaded_at      = 11;
  string         updated_at       = 12;
}
