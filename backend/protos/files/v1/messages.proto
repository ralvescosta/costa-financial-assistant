syntax = "proto3";

package files.v1;

import "common/v1/messages.proto";

option go_package = "github.com/ralvescosta/costa-financial-assistant/backend/protos/generated/files/v1;filesv1";

// DocumentKind classifies an uploaded document.
enum DocumentKind {
  DOCUMENT_KIND_UNSPECIFIED = 0;
  DOCUMENT_KIND_BILL        = 1;
  DOCUMENT_KIND_STATEMENT   = 2;
}

// AnalysisStatus tracks the asynchronous processing lifecycle.
enum AnalysisStatus {
  ANALYSIS_STATUS_UNSPECIFIED    = 0;
  ANALYSIS_STATUS_PENDING        = 1;
  ANALYSIS_STATUS_PROCESSING     = 2;
  ANALYSIS_STATUS_ANALYSED       = 3;
  ANALYSIS_STATUS_ANALYSIS_FAILED = 4;
}

// Document holds the uploaded PDF metadata and processing state.
message Document {
  string         id               = 1;
  string         project_id       = 2;
  string         uploaded_by      = 3;
  DocumentKind   kind             = 4;
  string         storage_provider = 5;
  string         storage_key      = 6;
  string         file_name        = 7;
  string         file_hash        = 8;
  AnalysisStatus analysis_status  = 9;
  string         failure_reason   = 10;
  string         uploaded_at      = 11;
  string         updated_at       = 12;
}

// BillRecord holds structured extraction output from a classified bill PDF.
message BillRecord {
  string id               = 1;
  string project_id       = 2;
  string document_id      = 3;
  string due_date         = 4; // ISO date (YYYY-MM-DD)
  string amount_due       = 5; // decimal string
  string pix_payload      = 6; // nullable; empty string when not found
  string pix_qr_image_ref = 7; // nullable; storage reference to QR image
  string barcode          = 8; // nullable; empty string when not found
  string payment_status   = 9; // "unpaid", "paid", "overdue"
  string paid_at          = 10; // nullable ISO timestamp
  string created_at       = 11;
  string updated_at       = 12;
}

// TransactionLine is an individual entry from an account balance statement.
message TransactionLine {
  string id                    = 1;
  string project_id            = 2;
  string statement_id          = 3;
  string transaction_date      = 4; // ISO date
  string description           = 5;
  string amount                = 6; // decimal string
  string direction             = 7; // "credit" or "debit"
  string reconciliation_status = 8; // "unmatched", "matched_auto", "matched_manual", "ambiguous"
  string created_at            = 9;
}

// StatementRecord holds structured extraction output from a bank statement PDF.
message StatementRecord {
  string                  id              = 1;
  string                  project_id      = 2;
  string                  document_id     = 3;
  string                  bank_account_id = 4;
  string                  period_start    = 5; // ISO date
  string                  period_end      = 6; // ISO date
  repeated TransactionLine lines          = 7;
  string                  created_at      = 8;
  string                  updated_at      = 9;
}

// AnalysisJob tracks the async processing lifecycle for a document.
message AnalysisJob {
  string id            = 1;
  string project_id    = 2;
  string document_id   = 3;
  string job_type      = 4; // "extract_bill", "extract_statement"
  string status        = 5; // "queued", "running", "succeeded", "failed", "dead_lettered"
  int32  attempt_count = 6;
  string last_error    = 7;
  string created_at    = 8;
  string updated_at    = 9;
}

// BankAccount is a project-scoped label used for statement attribution.
message BankAccount {
  string id         = 1;
  string project_id = 2;
  string label      = 3;
  string created_by = 4;
  string created_at = 5;
  string updated_at = 6;
}
