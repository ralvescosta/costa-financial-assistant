syntax = "proto3";

package identity.v1;

import "identity/v1/messages.proto";

option go_package = "github.com/ralvescosta/costa-financial-assistant/backend/protos/generated/identity/v1;identityv1";

// IdentityService manages token issuance and JWKS metadata for the platform.
service IdentityService {
  // IssueBootstrapToken issues a signed JWT for the seeded bootstrap user/project.
  rpc IssueBootstrapToken(IssueBootstrapTokenRequest) returns (IssueBootstrapTokenResponse);

  // ValidateToken verifies a JWT and returns the decoded claims.
  rpc ValidateToken(ValidateTokenRequest) returns (ValidateTokenResponse);

  // GetJwksMetadata returns the public JWKS for external validators (BFF).
  rpc GetJwksMetadata(GetJwksMetadataRequest) returns (GetJwksMetadataResponse);
}

// ─── IssueBootstrapToken ─────────────────────────────────────────────────────
message IssueBootstrapTokenRequest {
  string user_id    = 1;
  string project_id = 2;
  string role       = 3;
}

message IssueBootstrapTokenResponse {
  string token      = 1;
  int64  expires_at = 2;
}

// ─── ValidateToken ───────────────────────────────────────────────────────────
message ValidateTokenRequest {
  string token = 1;
}

message ValidateTokenResponse {
  bool       valid  = 1;
  JwtClaims  claims = 2;
}

// ─── GetJwksMetadata ─────────────────────────────────────────────────────────
message GetJwksMetadataRequest {}

message GetJwksMetadataResponse {
  JwksMetadata jwks = 1;
}
